<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <img src="cloud.png">
            Weather App
        </div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About this</a></li>
            <li><a href="#">How to use?</a></li>
        </ul>
        <div class="Search-box">
            <input type="text" id="cityInput" placeholder="Search city or district....">
            <button onclick="getWeather()">Search</button>
        </div>
    </nav>
    <div class="container">
        <main class="container mt-5">
            <div class="row row-cols-1 row-cols-md-3 mb-3 text-center">
                <div class="col">
                    <div class="card mb-4 rounded-3 shadow-sm border-primary">
                        <div class="card-header py-3 text-bg-primary border-primary">
                            <h4 class="my-0 fw-normal">Temperature</h4>
                        </div>
                        <div class="card-body">
                            <img src="temp.png" style="width: 100px; margin-bottom: 10px;">
                            <h1 class="card-title" id="temperature">--C°</h1>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card mb-4 rounded-3 shadow-sm border-primary">
                        <div class="card-header py-3 text-bg-primary border-primary">
                            <h4 class="my-0 fw-normal">Humidity</h4>
                        </div>
                        <div class="card-body">
                            <img src="humi2.png" style="width:100px; margin-bottom: 10px;">
                            <h1 class="card-title" id="humidity">--%</h1>
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div class="card mb-4 rounded-3 shadow-sm border-primary">
                        <div class="card-header py-3 text-bg-primary border-primary">
                            <h4 class="my-0 fw-normal">Wind Speed</h4>
                        </div>
                        <div class="card-body">
                            <img src="wind2.png" style="width:100px; margin-bottom: 10px;">
                            <h1 class="card-title" id="windspeed">-- km/h</h1>

                        </div>
                    </div>
                </div>
                <div class="col d-flex justify-content-center weather-card">
                    <div class="card mb-4 rounded-3 shadow-sm border-primary">
                        <div class="card-header py-3 text-bg-primary border-primary">
                            <h4 class="my-0 fw-normal">Weather Condition</h4>
                        </div>
                        <div class="card-body">
                            <h1 class="card-title" id="condition">--</h1>
                            <img id="WeatherImage" src="cloud.png" alt="weather"
                                style="width: 100px; margin-top: 10px;">
                        </div>
                    </div>
                </div>
                <div id="forecast"></div>
            </div>

            <script src="script.js"></script>
            <script>
                console.log("HTML loaded");
            </script>
</body>

</html>
